<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creditos - Finanzas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#f7f7f5;--surface:#fff;--border:rgba(0,0,0,0.1);--text:#1a1a1a;--muted:#666;--green:#1D9E75;--green-bg:#E1F5EE;--red:#D85A30;--red-bg:#FAECE7;--blue:#185FA5;--blue-bg:#E6F1FB;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
#app{max-width:900px;margin:0 auto;padding:1rem}
.app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.header-left{display:flex;align-items:center;gap:12px}
.btn-back{padding:7px 14px;font-size:13px;border:1px solid var(--border);background:var(--surface);border-radius:8px;cursor:pointer;color:var(--text);text-decoration:none;display:inline-block}
.app-header h1{font-size:20px;font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1rem}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
.card-title{font-size:13px;font-weight:500;color:var(--muted)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--bg);color:var(--text)}
.btn-save{padding:10px 28px;background:var(--text);color:white;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer}
.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
.metric-label{font-size:12px;color:var(--muted);margin-bottom:4px}
.metric-value{font-size:20px;font-weight:600}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item{background:var(--bg);border-radius:8px;padding:.85rem 1rem}
.detail-label{font-size:12px;color:var(--muted);margin-bottom:4px}
.detail-value{font-size:16px;font-weight:600}
.result-box{background:var(--blue-bg);border-radius:8px;padding:1rem;color:var(--blue);line-height:1.6}
#grafico-prepago{margin-top:12px;max-height:280px}
@media(max-width:580px){
  .app-header{flex-direction:column;align-items:flex-start}
  .metrics,.detail-grid,.form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="app">
  <div class="app-header">
    <div class="header-left">
      <a href="index.html" class="btn-back">&#8592; Volver</a>
      <h1>Creditos</h1>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Valor UF</span>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>UF actual</label>
        <input type="number" id="uf">
      </div>
      <div class="form-group" style="display:flex;align-items:flex-end">
        <button class="btn-save" onclick="cargarUF()">Actualizar UF</button>
      </div>
    </div>
  </div>

  <div id="resumen"></div>
  <div class="card" id="hipotecario"></div>
  <div class="card" id="consumo"></div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">Simulador prepago</span>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>Credito a amortizar</label>
        <select id="credito-select">
          <option value="hipotecario">Hipotecario - Scotiabank</option>
          <option value="consumo">Consumo - BCI</option>
        </select>
      </div>
      <div class="form-group">
        <label>Monto prepago (CLP)</label>
        <input type="number" id="prepago" placeholder="Monto prepago (CLP)">
      </div>
      <div class="form-group">
        <label>Modo</label>
        <select id="modo">
          <option value="plazo">Reducir plazo</option>
          <option value="cuota">Reducir dividendo</option>
        </select>
      </div>
    </div>
    <button class="btn-save" style="margin-top:1rem" onclick="simularPrepagoPro()">Simular</button>
    <div class="result-box" id="resultado-prepago" style="display:none;margin-top:1rem"></div>
    <div class="card" style="margin-top:1rem;margin-bottom:0">
      <div class="card-header">
        <span class="card-title">Comparacion</span>
      </div>
      <canvas id="grafico-prepago"></canvas>
    </div>
  </div>
</div>

<script>
const creditoHipotecario={
  banco:"Scotiabank",
  saldoUF:2235.4922,
  cuotaUF:12.9883,
  tasa:4.98,
  totalCuotas:360,
  pagadasBase:8
};

const creditoConsumo={
  banco:"BCI",
  saldoCLP:8667989,
  cuotaCLP:307363,
  tasa:1.09,
  totalCuotas:48,
  pagadasBase:14
};

let gc=null;
let txData=null;
const FECHA_INICIO_CREDITOS="2026-04-15";

function getCreditoSeleccionado(){
  const tipo=document.getElementById("credito-select").value;
  const uf=parseFloat(document.getElementById("uf").value)||0;
  if(tipo==="hipotecario"){
    return {
      nombre:`Hipotecario - ${creditoHipotecario.banco}`,
      moneda:"UF",
      saldo:getSaldoActual("hipotecario",uf),
      cuota:creditoHipotecario.cuotaUF,
      tasaMensual:creditoHipotecario.tasa/100/12,
      mesesRestantes:creditoHipotecario.totalCuotas-getPagadasActuales("hipotecario")
    };
  }
  return {
    nombre:`Consumo - ${creditoConsumo.banco}`,
    moneda:"CLP",
    saldo:getSaldoActual("consumo",uf),
    cuota:creditoConsumo.cuotaCLP,
    tasaMensual:creditoConsumo.tasa/100,
    mesesRestantes:creditoConsumo.totalCuotas-getPagadasActuales("consumo")
  };
}

function loadCfg(){try{return JSON.parse(localStorage.getItem("gh_cfg"));}catch{return null;}}
function gh(p){return "https://api.github.com/repos/"+gc.user+"/"+gc.repo+"/contents/"+p;}
function ghH(){return {"Authorization":"token "+gc.token,"Content-Type":"application/json","Accept":"application/vnd.github.v3+json"};}
async function ghGet(file){
  const r=await fetch(gh(file),{headers:ghH()});
  if(r.status===404)return null;
  if(r.status===401)throw new Error("Token invalido");
  if(!r.ok)throw new Error("GitHub "+r.status+" al leer "+file);
  return r.json();
}
function decodeGitHubJsonFile(content){
  const binary=atob(content.replace(/\n/g,""));
  const bytes=new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);
  return JSON.parse(new TextDecoder("utf-8").decode(bytes));
}
function norm(s){
  return (s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
}
function contarPagosCategoria(nombreCategoria){
  if(!txData?.transactions)return 0;
  const aliases={
    hipotecario:["Hipotecario"],
    consumo:["Creditos Consumo","Credito de consumo","Créditos Consumo","Crédito de consumo"]
  };
  const categorias=(aliases[nombreCategoria]||[nombreCategoria]).map(norm);
  return txData.transactions.filter(t=>
    t.type==="Gasto" &&
    t.date>=FECHA_INICIO_CREDITOS &&
    categorias.includes(norm(t.category))
  ).length;
}
function sumarPagosCategoria(nombreCategoria){
  if(!txData?.transactions)return 0;
  const aliases={
    hipotecario:["Hipotecario"],
    consumo:["Creditos Consumo","Credito de consumo","Créditos Consumo","Crédito de consumo"]
  };
  const categorias=(aliases[nombreCategoria]||[nombreCategoria]).map(norm);
  return txData.transactions
    .filter(t=>
      t.type==="Gasto" &&
      t.date>=FECHA_INICIO_CREDITOS &&
      categorias.includes(norm(t.category))
    )
    .reduce((sum,t)=>sum+(Number(t.amount)||0),0);
}
function getPagadasActuales(tipo){
  if(tipo==="hipotecario"){
    return Math.min(creditoHipotecario.totalCuotas,creditoHipotecario.pagadasBase+contarPagosCategoria("hipotecario"));
  }
  return Math.min(creditoConsumo.totalCuotas,creditoConsumo.pagadasBase+contarPagosCategoria("consumo"));
}
function getSaldoActual(tipo,uf){
  if(tipo==="hipotecario"){
    const pagosCLP=sumarPagosCategoria("hipotecario");
    const pagosUF=uf?(pagosCLP/uf):0;
    return Math.max(0,creditoHipotecario.saldoUF-pagosUF);
  }
  return Math.max(0,creditoConsumo.saldoCLP-sumarPagosCategoria("consumo"));
}
async function cargarPagosCreditos(){
  try{
    gc=loadCfg();
    if(!gc)return;
    const dataFile=await ghGet("data.json");
    if(!dataFile)return;
    txData=decodeGitHubJsonFile(dataFile.content);
    render();
  }catch(e){
    console.warn("No se pudo sincronizar el avance de creditos:",e.message);
  }
}

async function cargarUF(){
  try{
    const res=await fetch("https://mindicador.cl/api/uf");
    const data=await res.json();
    document.getElementById("uf").value=data.serie[0].valor;
    render();
  }catch{
    alert("Error cargando UF");
  }
}

function clp(n){return "$"+Math.round(n).toLocaleString("es-CL");}

function render(){
  const uf=parseFloat(document.getElementById("uf").value);
  if(!uf)return;

  const saldoHipUF=getSaldoActual("hipotecario",uf);
  const saldoConsumo=getSaldoActual("consumo",uf);
  const saldoHip=saldoHipUF*uf;
  const cuotaHip=creditoHipotecario.cuotaUF*uf;
  const pagadasHip=getPagadasActuales("hipotecario");
  const pagadasConsumo=getPagadasActuales("consumo");

  document.getElementById("resumen").innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="metric-label">Deuda total</div><div class="metric-value">${clp(saldoHip+saldoConsumo)}</div></div>
      <div class="metric"><div class="metric-label">Carga mensual</div><div class="metric-value">${clp(cuotaHip+creditoConsumo.cuotaCLP)}</div></div>
    </div>
  `;

  document.getElementById("hipotecario").innerHTML=`
    <div class="card-header"><span class="card-title">Credito hipotecario - ${creditoHipotecario.banco}</span></div>
    <div class="detail-grid">
      <div class="detail-item"><div class="detail-label">Saldo</div><div class="detail-value">${clp(saldoHip)}</div></div>
      <div class="detail-item"><div class="detail-label">Dividendo</div><div class="detail-value">${clp(cuotaHip)}</div></div>
      <div class="detail-item"><div class="detail-label">Tasa</div><div class="detail-value">${creditoHipotecario.tasa}%</div></div>
      <div class="detail-item"><div class="detail-label">Progreso</div><div class="detail-value">${pagadasHip}/${creditoHipotecario.totalCuotas}</div></div>
    </div>
  `;

  document.getElementById("consumo").innerHTML=`
    <div class="card-header"><span class="card-title">Credito de consumo - ${creditoConsumo.banco}</span></div>
    <div class="detail-grid">
      <div class="detail-item"><div class="detail-label">Saldo</div><div class="detail-value">${clp(saldoConsumo)}</div></div>
      <div class="detail-item"><div class="detail-label">Cuota</div><div class="detail-value">${clp(creditoConsumo.cuotaCLP)}</div></div>
      <div class="detail-item"><div class="detail-label">Tasa</div><div class="detail-value">${creditoConsumo.tasa}% mensual</div></div>
      <div class="detail-item"><div class="detail-label">Progreso</div><div class="detail-value">${pagadasConsumo}/${creditoConsumo.totalCuotas}</div></div>
    </div>
  `;
}

function simularCredito(saldo,cuota,tasa){
  let meses=0,intereses=0;
  while(saldo>0&&meses<360){
    const i=saldo*tasa;
    saldo-=(cuota-i);
    intereses+=i;
    meses++;
  }
  return{meses,intereses};
}

function calcularNuevaCuota(saldo,tasa,meses){
  return saldo*(tasa/(1-Math.pow(1+tasa,-meses)));
}

let chart;

function simularPrepagoPro(){
  const uf=parseFloat(document.getElementById("uf").value);
  const prepago=parseFloat(document.getElementById("prepago").value);
  const modo=document.getElementById("modo").value;
  const credito=getCreditoSeleccionado();

  if(!prepago)return alert("Completa datos");
  if(credito.moneda==="UF"&&!uf)return alert("Completa el valor UF");

  const prepagoEnUnidad=credito.moneda==="UF" ? prepago/uf : prepago;
  const nuevoSaldo=credito.saldo-prepagoEnUnidad;
  if(nuevoSaldo<=0)return alert("El prepago supera el saldo del credito");

  const orig=simularCredito(credito.saldo,credito.cuota,credito.tasaMensual);
  let nuevo,nuevaCuota=credito.cuota;

  if(modo==="plazo"){
    nuevo=simularCredito(nuevoSaldo,credito.cuota,credito.tasaMensual);
  }else{
    nuevaCuota=calcularNuevaCuota(nuevoSaldo,credito.tasaMensual,credito.mesesRestantes);
    nuevo=simularCredito(nuevoSaldo,nuevaCuota,credito.tasaMensual);
  }

  const factorMoneda=credito.moneda==="UF" ? uf : 1;
  const ahorro=(orig.intereses-nuevo.intereses)*factorMoneda;
  const saldoOriginal=credito.saldo*factorMoneda;
  const saldoNuevo=nuevoSaldo*factorMoneda;

  const resultado=document.getElementById("resultado-prepago");
  resultado.style.display="block";
  resultado.innerHTML=`
    <p><strong>Credito:</strong> ${credito.nombre}</p>
    <p><strong>Saldo actual:</strong> ${clp(saldoOriginal)}</p>
    <p><strong>Saldo despues del prepago:</strong> ${clp(saldoNuevo)}</p>
    <p><strong>Antes:</strong> ${orig.meses} meses</p>
    <p><strong>Despues:</strong> ${nuevo.meses} meses</p>
    <p><strong>Ahorro:</strong> ${clp(ahorro)}</p>
    ${modo==="cuota"?`<p><strong>Nueva cuota:</strong> ${clp(nuevaCuota*factorMoneda)}</p>`:""}
  `;

  renderChart(orig,nuevo);
}

function renderChart(a,b){
  const ctx=document.getElementById("grafico-prepago");
  if(chart)chart.destroy();

  chart=new Chart(ctx,{
    type:"bar",
    data:{
      labels:["Antes","Despues"],
      datasets:[
        {label:"Meses",data:[a.meses,b.meses],backgroundColor:"#5DCAA5"},
        {label:"Intereses",data:[a.intereses,b.intereses],backgroundColor:"#F0997B"}
      ]
    },
    options:{responsive:true,maintainAspectRatio:true}
  });
}

window.addEventListener("load",()=>{
  document.getElementById("uf").value=37000;
  render();
  cargarPagosCreditos();
});
</script>
</body>
</html>
